name: Bot Predictor - Horario Cuba

on:
  schedule:
    # Zona horaria UTC-5 (Cuba)
    # 8:00 AM Cuba = 13:00 UTC
    - cron: '0 13 * * *'   # INICIO 8am
    
    # 12:00 PM Cuba = 17:00 UTC
    - cron: '0 17 * * *'   # APAGAR 12pm
    
    # 1:00 PM Cuba = 18:00 UTC
    - cron: '0 18 * * *'   # INICIO 1pm
    
    # 6:00 PM Cuba = 23:00 UTC
    - cron: '0 23 * * *'   # APAGAR 6pm
    
    # 7:00 PM Cuba = 00:00 UTC (día siguiente)
    - cron: '0 0 * * *'    # INICIO 7pm
    
    # 12:00 AM Cuba = 05:00 UTC
    - cron: '0 5 * * *'    # APAGAR 12am
  
  workflow_dispatch:  # Para pruebas manuales

jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 390  # 6.5 horas máximo
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
      
      - name: Ejecutar Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          echo "🤖 Bot iniciado en horario programado"
          echo "🕒 Hora UTC: $(date -u)"
          echo "🕒 Hora Cuba: $(TZ='America/Havana' date)"
          python bot.py
